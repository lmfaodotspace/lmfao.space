  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .logo-container {
      width: 800px;
      height: 800px;
      position: relative;
    }
    .logo {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      animation: spin 6s linear infinite;
      transition: opacity 1s ease;
      opacity: 0;
    }
    .logo.visible {
      opacity: 1;
    }
    @keyframes spin {
      from { transform: rotateY(0deg); }
      to   { transform: rotateY(360deg); }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="XD_logo_loadingscreen_blur.webp" class="logo visible" id="logo1">
    <img src="XD_logo_loadingscreen_cablemanagement.webp" class="logo" id="logo2">
    <img src="XD_logo_loadingscreen_citylights.webp" class="logo" id="logo3">
    <img src="XD_logo_loadingscreen_cityskeuomorph.webp" class="logo" id="logo4">
    <img src="XD_logo_loadingscreen_connections.webp" class="logo" id="logo5">
    <img src="XD_logo_loadingscreen_dashboard.webp" class="logo" id="logo6">
    <img src="XD_logo_loadingscreen_fireworks.webp" class="logo" id="logo7">
    <img src="XD_logo_loadingscreen_party.webp" class="logo" id="logo8">
    <img src="XD_logo_loadingscreen_turbine.webp" class="logo" id="logo9">
  </div>
  <script>
    const logos = Array.from({ length: 9 }, (_, i) =>
      document.getElementById(`logo${i + 1}`)
    );
    let index = 0;
    setInterval(() => {
      logos[index].classList.remove('visible');
      index = (index + 1) % logos.length;
      logos[index].classList.add('visible');
    }, 6000);
  </script>
